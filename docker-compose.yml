name: opengate

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: opengate
      POSTGRES_USER: opengate
      POSTGRES_PASSWORD: opengate_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U opengate -d opengate" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: [ "redis-server", "--save", "60", "1", "--loglevel", "warning" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── OpenGate Identity Server ─────────────────────────────────────────────────
  opengate:
    build:
      context: .
      dockerfile: samples/OpenGate.Sample.Basic/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      OpenGate__DatabaseProvider: postgresql
      # Override connection string to point at the compose PostgreSQL service
      ConnectionStrings__OpenGate: >-
        Host=postgres;Port=5432;Database=opengate;
        Username=opengate;Password=opengate_dev
      OpenGate__IssuerUri: "http://localhost:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
