name: opengate-sample-postgresql

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: opengate_sample
      POSTGRES_USER: opengate
      POSTGRES_PASSWORD: opengate_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U opengate -d opengate_sample" ]
      interval: 10s
      timeout: 5s
      retries: 10
